<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
    font-size:40px;
}

.board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    border:8px solid #222;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.square{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    cursor:pointer;
    transition:.3s;
}

.square:hover{
    background:#66bb6a !important;
}

.white{
    background:#f0d9b5;
}

.black{
    background:#b58863;
}
</style>

</head>
<body>

<div class="container">

<h1>♔ Chess Game ♛</h1>

<div class="board">

<!-- Row 8 -->
<div class="square white">♜</div>
<div class="square black">♞</div>
<div class="square white">♝</div>
<div class="square black">♛</div>
<div class="square white">♚</div>
<div class="square black">♝</div>
<div class="square white">♞</div>
<div class="square black">♜</div>

<!-- Row 7 -->
<div class="square black">♟</div>
<div class="square white">♟</div>
<div class="square black">♟</div>
<div class="square white">♟</div>
<div class="square black">♟</div>
<div class="square white">♟</div>
<div class="square black">♟</div>
<div class="square white">♟</div>

<!-- Row 6 -->
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>

<!-- Row 5 -->
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>

<!-- Row 4 -->
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>

<!-- Row 3 -->
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>
<div class="square black"></div>
<div class="square white"></div>

<!-- Row 2 -->
<div class="square white">♙</div>
<div class="square black">♙</div>
<div class="square white">♙</div>
<div class="square black">♙</div>
<div class="square white">♙</div>
<div class="square black">♙</div>
<div class="square white">♙</div>
<div class="square black">♙</div>

<!-- Row 1 -->
<div class="square black">♖</div>
<div class="square white">♘</div>
<div class="square black">♗</div>
<div class="square white">♕</div>
<div class="square black">♔</div>
<div class="square white">♗</div>
<div class="square black">♘</div>
<div class="square white">♖</div>

</div>

</div>

</body>
</html>
