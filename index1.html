<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    text-align:center;
}

h1{
    color:white;
    margin-bottom:20px;
}

#status{
    color:white;
    font-size:22px;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,120px);
    grid-template-rows:repeat(3,120px);
    gap:8px;
}

.cell{
    background:white;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    cursor:pointer;
    transition:0.3s;
}

.cell:hover{
    background:#e3f2fd;
}

button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0d47a1;
}
</style>
</head>

<body>

<div class="container">

<h1>⭕ Tic Tac Toe ❌</h1>

<div id="status">Player X Turn</div>

<div class="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<button onclick="restartGame()">Restart Game</button>

</div>

<script>

const cells=document.querySelectorAll(".cell");
const statusText=document.getElementById("status");

let currentPlayer="X";
let gameRunning=true;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach(cell=>{
cell.addEventListener("click",cellClicked);
});

function cellClicked(){

if(this.textContent!=="" || !gameRunning)
return;

this.textContent=currentPlayer;

checkWinner();

if(gameRunning){
currentPlayer=currentPlayer==="X"?"O":"X";
statusText.textContent="Player "+currentPlayer+" Turn";
}

}

function checkWinner(){

let winner=false;

winPatterns.forEach(pattern=>{

const a=cells[pattern[0]].textContent;
const b=cells[pattern[1]].textContent;
const c=cells[pattern[2]].textContent;

if(a!=="" && a===b && b===c){
winner=true;
}

});

if(winner){
statusText.textContent="🎉 Player "+currentPlayer+" Wins!";
gameRunning=false;
return;
}

let draw=true;

cells.forEach(cell=>{
if(cell.textContent==="") draw=false;
});

if(draw){
statusText.textContent="🤝 Match Draw!";
gameRunning=false;
}

}

function restartGame(){

cells.forEach(cell=>{
cell.textContent="";
});

currentPlayer="X";
gameRunning=true;
statusText.textContent="Player X Turn";

}

</script>

</body>
</html>
