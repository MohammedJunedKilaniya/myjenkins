<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>

    <style>
        body{
            margin:0;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#222;
            font-family:Arial, sans-serif;
        }

        .board{
            display:grid;
            grid-template-columns:repeat(8,80px);
            grid-template-rows:repeat(8,80px);
            border:8px solid #333;
        }

        .cell{
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:45px;
        }

        .white{
            background:#f0d9b5;
        }

        .black{
            background:#b58863;
        }
    </style>
</head>
<body>

<div class="board">

    <!-- Row 8 -->
    <div class="cell white">♜</div>
    <div class="cell black">♞</div>
    <div class="cell white">♝</div>
    <div class="cell black">♛</div>
    <div class="cell white">♚</div>
    <div class="cell black">♝</div>
    <div class="cell white">♞</div>
    <div class="cell black">♜</div>

    <!-- Row 7 -->
    <div class="cell black">♟</div>
    <div class="cell white">♟</div>
    <div class="cell black">♟</div>
    <div class="cell white">♟</div>
    <div class="cell black">♟</div>
    <div class="cell white">♟</div>
    <div class="cell black">♟</div>
    <div class="cell white">♟</div>

    <!-- Row 6 -->
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>

    <!-- Row 5 -->
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>

    <!-- Row 4 -->
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>

    <!-- Row 3 -->
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>
    <div class="cell black"></div>
    <div class="cell white"></div>

    <!-- Row 2 -->
    <div class="cell white">♙</div>
    <div class="cell black">♙</div>
    <div class="cell white">♙</div>
    <div class="cell black">♙</div>
    <div class="cell white">♙</div>
    <div class="cell black">♙</div>
    <div class="cell white">♙</div>
    <div class="cell black">♙</div>

    <!-- Row 1 -->
    <div class="cell black">♖</div>
    <div class="cell white">♘</div>
    <div class="cell black">♗</div>
    <div class="cell white">♕</div>
    <div class="cell black">♔</div>
    <div class="cell white">♗</div>
    <div class="cell black">♘</div>
    <div class="cell white">♖</div>

</div>

</body>
</html>
